name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  check-unused-composer-dependencies:
    name: Check unused composer dependencies

    runs-on: ubuntu-latest

    steps:
      - name: Check unused composer dependencies
        uses: hosmelq/.github/.github/actions/composer-unused-dependencies-check@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: '8.3'

  check-composer:
    name: Check composer

    runs-on: ubuntu-latest

    steps:
      - name: Check composer normalize
        uses: hosmelq/.github/.github/actions/composer-normalize-check@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: '8.3'

  check-static-code:
    name: Check static code

    runs-on: ubuntu-latest

    steps:
      - name: Check static code
        uses: hosmelq/.github/.github/actions/phpstan-check@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: '8.3'

  check-code-quality:
    name: Check code quality

    runs-on: ubuntu-latest

    steps:
      - name: Check code quality
        uses: hosmelq/.github/.github/actions/php-rector-check@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: '8.3'

  check-code-style:
    name: Check code style

    runs-on: ubuntu-latest

    steps:
      - name: Check code style
        uses: hosmelq/.github/.github/actions/php-pint-check@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: '8.3'

  tests:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
          --health-timeout 5s
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['12.*', '13.*']
        stability: [prefer-stable]
        include:
          - laravel: 12.*
            testbench: 10.*
          - laravel: 13.*
            testbench: 11.*

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install composer dependencies
        uses: hosmelq/.github/.github/actions/composer-install@3f9f936931ed05c535647b8988a006be574650cc
        with:
          php-version: ${{ matrix.php }}

      - name: Installed dependencies
        run: composer show -D

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install composer matrix dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
